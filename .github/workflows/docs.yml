name: Documentation

on:
  pull_request:
    paths:
      - 'src/**'
      - 'docs/**'
      - 'Project.toml'
      - 'Manifest.toml'
      - '.github/workflows/**'
  push:
    branches:
      - main
    tags: ['*']
    paths:
      - 'src/**'
      - 'docs/**'
      - 'Project.toml'
      - 'Manifest.toml'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: Documentation (Julia 1.12, Ubuntu)
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    permissions:
      contents: write
      statuses: write
      pull-requests: read
      actions: write

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"

      - name: Set depot path
        run: echo "JULIA_DEPOT_PATH=${{ github.workspace }}/.julia" >> $GITHUB_ENV

      - name: Cache Julia depot
        uses: actions/cache@v4
        with:
          path: ${{ env.JULIA_DEPOT_PATH }}
          key: ${{ runner.os }}-julia1.12-docs-${{ hashFiles('Project.toml', 'Manifest.toml', 'docs/Project.toml', 'docs/Manifest.toml') }}
          restore-keys: |
            ${{ runner.os }}-julia1.12-docs-

      - name: Instantiate, precompile, build docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          julia --color=yes --project=docs -e 'using Pkg; Pkg.instantiate(); Pkg.precompile()'
          julia --color=yes --project=docs docs/make.jl